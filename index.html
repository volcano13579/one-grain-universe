<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>午夜禁果占卜</title>
    <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;600&family=Noto+Sans+SC:wght@300;400&display=swap');

    :root {
        --bg-color: #0f0a0a; 
        --apple-red: #5e0b0b; 
        --gold-accent: #c5a059; 
        --text-main: #d1c7c7;
        --box-bg: #1a1414;
        --border-color: #3d2a2a;
        --font-serif: 'Noto Serif SC', serif;
        --font-sans: 'Noto Sans SC', sans-serif;
    }

    /* 增强版全屏水印背景层 */
    body::before {
        content: "在下一个宇宙我们仍然相爱";
        position: fixed;
        top: -50%; left: -50%; width: 200%; height: 200%;
        z-index: 0;
        pointer-events: none;
        font-size: 16px;
        color: rgba(197, 160, 89, 0.12);
        transform: rotate(-25deg);
        display: flex;
        flex-wrap: wrap;
        line-height: 150px;
        letter-spacing: 15px;
        overflow: hidden;
        justify-content: space-around;
        align-content: space-around;
    }


    body {
        background: radial-gradient(circle at center, var(--apple-red) 0%, var(--bg-color) 100%);
        color: var(--text-main);
        margin: 0; padding: 0;
        font-family: var(--font-serif);
        display: flex; flex-direction: column; align-items: center;
        min-height: 100vh;
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
        position: relative;
    }

    #overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: #000; z-index: 9999; display: flex; flex-direction: column;
        align-items: center; justify-content: center; transition: opacity 1.5s;
    }
    .apple-logo {
        width: 80px; height: 80px; background: var(--apple-red);
        border-radius: 50% 50% 45% 45%; box-shadow: 0 0 30px var(--apple-red);
        cursor: pointer; animation: pulse 2s infinite;
    }
    @keyframes pulse { 0% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.1); opacity: 1; } 100% { transform: scale(1); opacity: 0.8; } }

    .header { text-align: center; padding: 60px 20px 30px; position: relative; z-index: 10; }
    .header h1 { 
        font-size: 32px; letter-spacing: 8px; margin: 0; 
        color: var(--gold-accent); text-shadow: 0 0 15px rgba(197, 160, 89, 0.4);
        font-weight: 600;
        font-family: var(--font-serif);
    }
    #sub-title { font-family: var(--font-sans); font-size: 13px; opacity: 0.6; margin-top: 4px; letter-spacing: 2px;margin-bottom: -10px; }

    .page-section { display: none; width: 92%; max-width: 600px; margin-bottom: 40px; position: relative; z-index: 10; }
    .active { display: block; animation: fadeIn 0.8s ease; }
    /* 逐字浮现的容器样式 */
    .fade-text-container {
        color: var(--gold-accent);
        margin-bottom: 50px;
        font-size: 15px;
        line-height: 2; /* 增加行间距，让两行字更有呼吸感 */
        letter-spacing: 3px;
    }

    /* 每一个字的动画基础设置 */
    .char {
        display: inline-block;
        opacity: 0;
        transform: translateY(5px);
        animation: charFadeIn 0.5s ease forwards;
    }

    /* 动画效果：从模糊到清晰，从下方微微升起 */
    @keyframes charFadeIn {
        to {
            opacity: 0.8;
            transform: translateY(0);
            filter: blur(0);
        }
}
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  
/* 问题容器：决定所有问题怎么排队 */
.question-list {
   display: flex;
    flex-wrap: wrap;       /* 布局模式：允许换行（这是做双列的关键） */
    justify-content: center; /* 对齐方式：所有气泡在正中间集合 */
    gap: 10px;             /* 间距：上下左右两个气泡之间的缝隙 */
    padding: 10px 5px;     /* 整体边距：给左右两边留一点点空隙 */
}

/* 问题气泡：决定单个选项的长相 */
.question-item {
    font-family: var(--font-serif); /* 字体：使用你设定的宋体 */
    background: rgba(255, 255, 255, 0.05); /* 底色：半透明的星空黑 */
    border: 1px solid rgba(197, 160, 89, 0.3); /* 边框：淡淡的金色线条 */
    border-radius: 20px;    /* 圆角：决定气泡是方还是圆 */
    padding: 10px 12px;    /* 气泡高度与内宽：15是上下高度，20是左右宽度 */
    
    width: 44%;            /* 气泡宽度：占手机屏幕宽度的比例 */
    text-align: center;    /* 文字位置：文字在气泡里水平居中 */
    font-size: 13px;       /* 字号：气泡里问题文字的大小 */
    transition: all 0.3s;  /* 动画过渡：点击变色时的平滑度 */
    box-sizing: border-box; /* 辅助属性：确保边框不撑破宽度 */
}


/* 选中状态：发光效果 */
.question-item.selected {
    background: var(--gold-accent);
    color: #000;
    box-shadow: 0 0 20px rgba(157, 120, 50, 0.6);
    transform: scale(1.05);
}

    .draw-area { position: relative; height: 300px; margin-top: 20px; display: flex; flex-direction: column; align-items: center; }
    .card-fan { position: relative; width: 100%; height: 160px; display: flex; justify-content: center; cursor: pointer; }
    
    .shuffling { animation: breath 3s ease-in-out infinite; }
    @keyframes breath {
        0%, 100% { transform: scale(1); filter: brightness(1); }
        50% { transform: scale(1.03); filter: brightness(1.3); }
    }
    
    .fan-card-deco {
        position: absolute; width: 70px; height: 110px;
        background: var(--apple-red); border: 1.5px solid var(--gold-accent); border-radius: 5px;
        box-shadow: 0 5px 15px rgba(0,0,0,0.5); transition: transform 0.3s;
    }
    .fan-card-main { z-index: 10; transform: translateY(10px); background: var(--gold-accent); display: flex; align-items: center; justify-content: center; color: #000; font-size: 13px; font-weight: bold; }
/* 让卡牌在移动、变色时，都有一个 0.8 秒的丝滑过程 */
.card-slot, .fan-card-deco {
    transition: all 0.8s cubic-bezier(0.25, 1, 0.5, 1);
}

    .slot-container { display: flex; justify-content: center; gap: 12px; margin-top: 40px; }
    .card-slot {
        width: 60px; height: 90px; border: 1px dashed var(--gold-accent); border-radius: 6px;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        font-size: 11px; color: var(--gold-accent); opacity: 0.5; transition: all 0.3s;
    }
    .card-slot.filled { border: 1px solid var(--gold-accent); background: rgba(197, 160, 89, 0.2); opacity: 1; }

    .result-cards-display { display: flex; justify-content: space-around; margin: 20px 0;margin-bottom: 40px; gap: 8px; }
    .card-box { text-align: center; width: 30%; transition: all 0.5s; }
    .card-img { width: 90%; border-radius: 5px; border: 2px solid var(--gold-accent); box-shadow: 0 5px 15px rgba(0,0,0,0.4); margin-bottom: 8px; transition: transform 0.6s; }
    .interpretation-box { background: rgba(25, 18, 18, 0.85); backdrop-filter: blur(5px); border-radius: 12px; padding: 20px; border: 1px solid var(--border-color); }
    /* 问题回声的气泡样式 */
    .question-echo {
         font-weight: bold;
        text-align: center;
        color: var(--gold-accent);
        margin-bottom: 30px;
        padding: 12px 20px;
        background: rgba(94, 11, 11, 0.2); /* 淡淡的苹果红底色 */
        border: 1px solid rgba(197, 160, 89, 0.3); /* 金色半透明边框 */
        border-radius: 50px; /* 圆角气泡感 */
        display: inline-block; /* 宽度随文字走 */
        position: relative;
        left: 50%;
        transform: translateX(-50%); /* 居中对齐 */
        font-size: 15px;
        letter-spacing: 1.6px;
        box-shadow: 0 0 15px rgba(0, 0, 0, 0.3); /* 增加一点深度 */
    }

    /* 在问题前面加个小图标增强仪式感 */
    .question-echo::before {
        content: "◈";
        margin-right: 8px;
        opacity: 0.7;
}
    .interp-item { margin-bottom: 18px; border-left: 4cap solid var(--gold-accent); padding-left: 12px; }
    .interp-title { font-weight: bold; margin-bottom: 8px; color: var(--gold-accent); font-size:17px;letter-spacing: 2px }
    .interp-text { 
        font-family: var(--font-serif);
        font-size: 14px; line-height: 1.8; color: var(--text-main); 
        opacity: 0; transform: translateY(10px); transition: all 1s; text-align: justify; 
    }
    .interp-text.show { opacity: 0.8; transform: translateY(0); }

    .btn { 
        background: transparent; color: var(--gold-accent); border: 1px solid var(--gold-accent); 
        padding: 12px 40px; border-radius: 2px; cursor: pointer; margin: 25px auto; font-size: 15px; display: block;
        transition: all 0.3s; letter-spacing: 2px; position: relative; z-index: 20;
    }
    .btn:hover { background: var(--gold-accent); color: #000; }

    #preloader {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: var(--bg-color); z-index: 1000;
        display: none; flex-direction: column; align-items: center; justify-content: center;
        transition: opacity 0.5s;
    }
    .loading-orbit {
        width: 60px; height: 60px; border: 1px solid var(--gold-accent);
        border-radius: 50%; position: relative; animation: rotate 3s linear infinite;
    }
    .loading-orbit::after {
        content: ''; position: absolute; top: -5px; left: 50%; 
        width: 10px; height: 10px; background: var(--gold-accent); border-radius: 50%;
        box-shadow: 0 0 15px var(--gold-accent);
    }
    @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    .draw-area { position: relative; height: 320px; margin-top: 20px; display: flex; flex-direction: column; align-items: center; }
    .card-fan { position: relative; width: 100%; height: 160px; display: flex; justify-content: center; cursor: pointer; }
    .shuffling { animation: breath 3s ease-in-out infinite; }
    @keyframes breath { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

/* 第三步解读牌弹出速度 */
.card-box { 
    text-align: center; 
    width: 30%; 
    animation: fadeInUp 5s ease forwards; /* 1.2秒慢慢升起 */
}

/* 解读文字之间间距 */
.interp-item { 
    margin-bottom: 50px; /* 这里从18px改成了45px，间距直接翻倍 */
    border-left: 2px solid var(--gold-accent); 
    padding-left: 18px; 
}

/* 解读文字的间距 */
.interp-text { 
    font-size: 15px; 
    line-height: 2.2; /* 增加行间距 */
    letter-spacing: 1px; /* 增加字间距 */
}
    </style>
</head>
<body>

    <div id="preloader">
        <div class="loading-orbit"></div>
        <p id="loader-text" style="margin-top:25px; color:var(--gold-accent); font-size:13px; letter-spacing:2px;">正在建立宇宙连接...</p>
    </div>

    <div id="overlay" onclick="startExperience()">
        <div class="apple-logo"></div>
        <p style="margin-top: 20px; color: var(--gold-accent); letter-spacing: 3px; font-size: 14px;">点击禁果，开始与TA的连接</p>
    </div>

    <div class="header">
        <h1>禁果占卜</h1>
        <p id="sub-title">愿此间感应，指引你找到答案</p>
    </div>

    <div id="step1" class="page-section active">
        <p style="text-align:center; font-size: 20px; margin-bottom: 25px; opacity: 0.6;">— 选择你要探索的真相 —</p>
        <div class="question-list" id="qGrid"></div>
        <button id="startBtn" class="btn" style="display:none; margin-top:40px;" onclick="goToStep2()">开启仪式</button>
    </div>

  <div id="loading-page" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0f0a0a; z-index: 9998; flex-direction: column; align-items: center; justify-content: center;">
    <div class="loader-circle"></div>
    <p style="margin-top: 30px; color: #c5a059; letter-spacing: 5px; font-size: 13px; animation: blink 1.5s infinite;">正在建立宇宙连接...</p>
</div>

    <div id="step2" class="page-section" style="text-align: center;">
     <div class="fade-text-container" id="guideText">

            <div class="card-fan" onclick="drawOneCard()">

                <div class="fan-card-deco" style="transform: rotate(-15deg) translateX(-25px);"></div>
                <div class="fan-card-deco fan-card-main">抽牌</div>
                <div class="fan-card-deco" style="transform: rotate(15deg) translateX(25px);"></div>
                <div class="fan-card-deco" style="transform: rotate(30deg) translateX(50px);"></div>
            </div>
            <div class="slot-container">
                <div class="card-slot" id="slot0"><span></span><small>果核</small></div>
                <div class="card-slot" id="slot1"><span></span><small>诱引</small></div>
                <div class="card-slot" id="slot2"><span></span><small>吞噬</small></div>
            </div>
        <p style="margin-top:25px; font-size: 12px; opacity: 0.5;">已感应: <span id="count" style="color:var(--gold-accent);">0</span> / 3</p>
    </div>

   <div id="step3" class="page-section">
    <div id="questionEcho" class="question-echo"></div> 
    
    <div id="resultCards" class="result-cards-display"></div>
    <div id="interpretation" class="interpretation-box"></div>
    <button class="btn" onclick="location.reload()" style="margin-top:30px;">再次探索</button>
</div>
